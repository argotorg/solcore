<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>solcore IDE (React) — GHCJS backend</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: system-ui, sans-serif; margin: 0; height: 100vh; }
      #root { height: 100%; }
      .ide { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: auto 1fr; height: 100%; }
      .toolbar { grid-column: 1 / 3; display: flex; align-items: center; gap: 1rem;
                 padding: 0.4rem 0.8rem; border-bottom: 1px solid #ccc; flex-wrap: wrap; }
      .toolbar .flags { display: flex; gap: 0.8rem; flex-wrap: wrap; font-size: 12px; }
      .sidebar { border-right: 1px solid #ccc; overflow: auto; padding: 0.3rem; }
      .main { display: grid; grid-template-rows: auto 1fr 1fr; min-width: 0; min-height: 0; }

      /* tree (mirrors remix-ui/tree-view) */
      ul.tree { list-style: none; margin: 0; padding-left: 0; }
      ul.tree ul { list-style: none; margin: 0; padding-left: 0; }
      .node-row { display: flex; align-items: center; gap: 4px; padding: 2px 4px;
                  cursor: pointer; white-space: nowrap; font-size: 13px; border-radius: 3px; }
      .node-row:hover { background: #eef; }
      .node-row.active { background: #d7e3ff; }
      .caret { width: 10px; display: inline-block; color: #666; }

      /* tabs (mirrors remix-ui/tabs) */
      .tabs { display: flex; border-bottom: 1px solid #ccc; overflow-x: auto; }
      .tab { display: flex; align-items: center; gap: 6px; padding: 4px 10px;
             border-right: 1px solid #ddd; cursor: pointer; white-space: nowrap; font-size: 13px; }
      .tab.active { background: #d7e3ff; }
      .tab-close { color: #999; }
      .tab-close:hover { color: #b00020; }

      textarea.editor { width: 100%; height: 100%; border: 0; resize: none; padding: 8px;
                        font-family: ui-monospace, monospace; font-size: 13px; white-space: pre; }
      .panes { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #ccc; min-height: 0; }
      .pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; border-right: 1px solid #eee; }
      .pane-label { font-size: 11px; color: #555; padding: 2px 6px; background: #f5f5f5; }
      .pane-body { flex: 1; overflow: auto; margin: 0; padding: 8px;
                   font-family: ui-monospace, monospace; font-size: 12px; white-space: pre-wrap; }
      .pane-body.error { color: #b00020; }
      button { font-size: 13px; padding: 3px 12px; cursor: pointer; }
      .status { font-size: 12px; color: #555; }
      .empty { padding: 1rem; color: #888; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="ide.js"></script>
  </body>
</html>
